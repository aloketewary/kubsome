apiVersion: v1
kind: Namespace
metadata:
  name: kubsome
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubsome
  namespace: kubsome
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubsome-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: kubsome
    namespace: kubsome
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubsome
  namespace: kubsome
  labels:
    app: kubsome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubsome
  template:
    metadata:
      labels:
        app: kubsome
    spec:
      serviceAccountName: kubsome
      containers:
        - name: kubsome
          image: kubsome:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kubsome
  namespace: kubsome
spec:
  selector:
    app: kubsome
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubsome
  namespace: kubsome
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: kubsome.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubsome
                port:
                  number: 80
