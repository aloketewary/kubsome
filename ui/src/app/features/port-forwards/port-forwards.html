<div class="intel-header">
  <div class="intel-title-block">
    <h1 class="intel-title"><span class="title-icon">🔀</span> Port Forwards</h1>
    <p class="intel-subtitle">{{ forwards.length }} active</p>
  </div>
  <div class="intel-controls">
    <button class="ctrl-btn ctrl-btn-wide" (click)="stopAll()" [class.disabled]="!forwards.length"><i class="pi pi-stop"></i> Stop All</button>
    <button class="ctrl-btn" (click)="refresh()"><i class="pi pi-refresh"></i></button>
  </div>
</div>

<div class="metrics-strip">
  <app-metric-tile label="Active" [value]="'' + forwards.length" accent="cyan" />
</div>

<!-- New Forward -->
<app-holo-card title="New Forward" icon="pi pi-plus" glow="cyan" [compact]="true">
  <div class="new-form">
    <input [(ngModel)]="newTarget" placeholder="Pod or service" />
    <input [(ngModel)]="newLocalPort" placeholder="Local" type="number" class="port-input" />
    <span class="port-sep">:</span>
    <input [(ngModel)]="newRemotePort" placeholder="Remote" type="number" class="port-input" />
    <button class="ctrl-btn ctrl-btn-wide" (click)="startForward()" [class.disabled]="!newTarget || !newLocalPort"><i class="pi pi-play"></i> Start</button>
  </div>
</app-holo-card>

<!-- Forwards List -->
@if (forwards.length) {
  <div class="fwd-list">
    @for (fwd of forwards; track fwd.key) {
      <div class="fwd-row" [class.fwd-dead]="!fwd.alive">
        <app-status-beacon [status]="fwd.alive ? 'ok' : 'critical'" size="md" [pulse]="!fwd.alive" />
        <div class="fwd-body">
          <span class="fwd-target">{{ fwd.target }}</span>
          <code class="fwd-ports">localhost:{{ fwd.local_port }} → :{{ fwd.remote_port }}</code>
        </div>
        <span class="fwd-ns">{{ fwd.namespace }}</span>
        <app-action-icon icon="pi pi-external-link" tooltip="Open" accent="cyan" (clicked)="openUrl(fwd.url)" />
        <app-action-icon icon="pi pi-stop" tooltip="Stop" accent="red" (clicked)="stopForward(fwd.target)" />
      </div>
    }
  </div>
} @else {
  <div class="empty-state"><div class="empty-icon"><i class="pi pi-link"></i></div><span>No active forwards</span></div>
}
