<!-- ─── Header ─────────────────────────────────────────────────────── -->
<app-intel-header title="Schedules" icon="pi pi-clock"
  [subtitle]="schedules.length + ' recurring workflows'">
  <button class="ctrl-btn" (click)="showForm = !showForm" pTooltip="Add schedule">
    <i class="pi pi-plus"></i>
  </button>
</app-intel-header>

<!-- ─── Metrics Strip ──────────────────────────────────────────────── -->
<div class="metrics-strip">
  <app-metric-tile label="Active" [value]="'' + activeCount" accent="green" />
  <app-metric-tile label="Paused" [value]="'' + pausedCount" accent="amber" />
  <app-metric-tile label="Total" [value]="'' + schedules.length" accent="cyan" />
</div>

<!-- ─── Add Form ───────────────────────────────────────────────────── -->
@if (showForm) {
  <div class="form-grid">
    <input [(ngModel)]="newName" placeholder="Name" />
    <input [(ngModel)]="newCron" placeholder="Cron (e.g. 0 8 * * *)" />
    <input [(ngModel)]="newCommands" placeholder="Commands (comma-separated)" />
  </div>
  <div class="presets">
    @for (p of presets; track p.cron) {
      <button class="preset-btn" (click)="newCron = p.cron">{{ p.label }}</button>
    }
  </div>
  <button class="ctrl-btn ctrl-btn-wide" style="margin-top: 8px;" (click)="addSchedule()" [class.disabled]="!newName || !newCron || !newCommands">Create</button>
}

<!-- ─── Schedule List ──────────────────────────────────────────────── -->
@if (schedules.length > 0) {
  <div class="sched-list">
    @for (s of schedules; track s.name) {
      <app-data-row [primary]="s.name" [secondary]="s.cron + ' · ' + (s.commands?.join(', ') || '')"
                    [status]="s.enabled !== false ? 'ok' : 'idle'">
        <p-tag meta [value]="s.enabled !== false ? 'Active' : 'Paused'" [severity]="s.enabled !== false ? 'success' : 'warn'" [rounded]="true" />
        <app-action-icon icon="pi pi-trash" tooltip="Remove" accent="red" (clicked)="removeSchedule(s.name)" />
      </app-data-row>
    }
  </div>
} @else {
  <div class="empty-state">
    <div class="empty-icon"><i class="pi pi-clock"></i></div>
    <span>No schedules configured</span>
    <span class="empty-hint">Create a schedule to run commands on a cron</span>
  </div>
}
