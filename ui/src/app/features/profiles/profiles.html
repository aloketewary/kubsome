<!-- ─── Header ─────────────────────────────────────────────────────── -->
<app-intel-header title="Profiles" icon="pi pi-user"
  [subtitle]="'active: ' + (active || 'default')">
  <button class="ctrl-btn" (click)="reset()" [class.disabled]="!active" pTooltip="Reset to default">
    <i class="pi pi-undo"></i>
  </button>
  <button class="ctrl-btn" (click)="refresh()" pTooltip="Refresh">
    <i class="pi pi-refresh" [class.spinning]="loading"></i>
  </button>
</app-intel-header>

<!-- ─── Metrics Strip ──────────────────────────────────────────────── -->
<div class="metrics-strip">
  <app-metric-tile label="Profiles" [value]="'' + profiles.length" accent="cyan" />
  <app-metric-tile label="Active" [value]="active || 'default'" accent="green" />
</div>

<!-- ─── Profile List ───────────────────────────────────────────────── -->
@if (profiles.length) {
  <div class="profile-list">
    @for (p of profiles; track p.name) {
      <app-data-row [primary]="p.name" [secondary]="profileMeta(p)"
                    [status]="p.name === active ? 'ok' : 'idle'"
                    [selected]="p.name === active">
        <p-tag meta [value]="p.name === active ? 'active' : ''" [severity]="'success'" [rounded]="true"
               [style.visibility]="p.name === active ? 'visible' : 'hidden'" />
        @if (p.name !== active) {
          <app-action-icon icon="pi pi-check" tooltip="Activate" accent="green" (clicked)="activate(p.name)" />
        } @else {
          <app-action-icon icon="pi pi-times" tooltip="Deactivate" accent="red" (clicked)="reset()" />
        }
      </app-data-row>
    }
  </div>
}

@if (!profiles.length && !loading) {
  <div class="empty-state">
    <div class="empty-icon"><i class="pi pi-user"></i></div>
    <span>No profiles configured</span>
  </div>
}
@if (loading && !profiles.length) {
  <div class="loading-state"><div class="loader-ring"></div><span>Loading...</span></div>
}
