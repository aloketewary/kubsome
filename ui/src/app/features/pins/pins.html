<!-- ─── Header ─────────────────────────────────────────────────────── -->
<app-intel-header title="Saved Queries" icon="pi pi-bookmark"
  [subtitle]="pins.length + ' pinned queries'">
  <button class="ctrl-btn" (click)="showForm = !showForm" pTooltip="Add pin">
    <i class="pi pi-plus"></i>
  </button>
  <button class="ctrl-btn" (click)="refresh()" pTooltip="Refresh">
    <i class="pi pi-refresh"></i>
  </button>
</app-intel-header>

<!-- ─── Metrics Strip ──────────────────────────────────────────────── -->
<div class="metrics-strip">
  <app-metric-tile label="Pins" [value]="'' + pins.length" accent="cyan" />
</div>

<!-- ─── Add Form ───────────────────────────────────────────────────── -->
@if (showForm) {
  <div class="add-form">
    <input [(ngModel)]="newName" placeholder="Name" />
    <input [(ngModel)]="newQuery" placeholder="Query (e.g. scorecard)" />
    <button class="ctrl-btn ctrl-btn-wide" (click)="addPin()" [class.disabled]="!newName || !newQuery">Add</button>
  </div>
}

<!-- ─── Pins List ──────────────────────────────────────────────────── -->
@if (pins.length > 0) {
  <div class="pin-list">
    @for (pin of pins; track pin.name) {
      <app-data-row [primary]="pin.name" [secondary]="pin.query + (pin.last_run ? ' · Last: ' + formatTime(pin.last_run) : '')"
                    status="info" (rowClick)="runPin(pin)">
        <app-action-icon meta icon="pi pi-play" tooltip="Run" accent="green" (clicked)="runPin(pin)" />
        <app-action-icon icon="pi pi-trash" tooltip="Remove" accent="red" (clicked)="removePin(pin.name)" />
      </app-data-row>
      @if (pin.last_result) { <pre class="pin-result">{{ pin.last_result }}</pre> }
    }
  </div>
} @else {
  <div class="empty-state">
    <div class="empty-icon"><i class="pi pi-bookmark"></i></div>
    <span>No saved queries yet</span>
    <span class="empty-hint">Add a pin to save frequently used queries</span>
  </div>
}
