# Team Runbook: Payment Service Recovery
# Place .yaml files in .kubsome/runbooks/ (project) or ~/.kubsome/runbooks/ (user)
# They'll appear in: playbook <filename-without-extension>

title: "Payment Service Recovery"
steps:
  - "Check payment pods: [cyan]pods[/cyan] (look for payment-*)"
  - "Verify database connectivity from pod: [cyan]shell payment[/cyan]"
  - "Check downstream billing service: [cyan]dep-health payment[/cyan]"
  - "Review recent config changes: [cyan]diff-timeline[/cyan]"
  - "If OOM: increase memory to 512Mi and restart"
  - "If connection timeout: check network policies"
  - "Verify payment queue is draining (check app metrics)"
  - "Run smoke test after recovery"
  - "Update incident notes: [cyan]note payment recovered[/cyan]"
